name: build-images-action

permissions:
  contents: read

on:
  push:
    branches:
    - 'main'
    - 'release-*'
    tags:
    - 'v*'

jobs:
  generate-core-component-source-versions:
    if: github.repository == 'metal3-io/ironic-image'
    uses: ./.github/workflows/generate-core-component-source-versions.yml
  build_ironic:
    name: Build Ironic container image with default base image
    needs: generate-core-component-source-versions
    if: github.repository == 'metal3-io/ironic-image'
    permissions:
      contents: read
      id-token: write
    uses: metal3-io/project-infra/.github/workflows/container-image-build.yml@main # zizmor: ignore[unpinned-uses]
    with:
      image-name: 'ironic'
      pushImage: true
      image-build-args: |
        IRONIC_VERSION_LABEL=${{ needs.generate-core-component-source-versions.outputs.ironic-version }}
        NGS_VERSION_LABEL=${{ needs.generate-core-component-source-versions.outputs.ngs-version }}
      generate-sbom: true
      sign-image: true
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  build_ironic_cs10:
    name: Build Ironic container image with CentOS Stream 10
    needs: generate-core-component-source-versions
    if: github.repository == 'metal3-io/ironic-image'
    permissions:
      contents: read
      id-token: write
    uses: metal3-io/project-infra/.github/workflows/container-image-build.yml@main # zizmor: ignore[unpinned-uses]
    with:
      image-name: 'ironic_cs10'
      pushImage: true
      image-build-args: |
        IRONIC_VERSION_LABEL=${{ needs.generate-core-component-source-versions.outputs.ironic-version }}
        NGS_VERSION_LABEL=${{ needs.generate-core-component-source-versions.outputs.ngs-version }}
        BASE_IMAGE=quay.io/centos/centos:stream10-minimal
      generate-sbom: true
      sign-image: true
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  build_sushy-tools:
    name: Build sushy-tools image
    if: github.repository == 'metal3-io/ironic-image'
    permissions:
      contents: read
      id-token: write
    uses: metal3-io/project-infra/.github/workflows/container-image-build.yml@main # zizmor: ignore[unpinned-uses]
    with:
      image-name: 'sushy-tools'
      dockerfile-directory: resources/sushy-tools
      pushImage: true
      generate-sbom: true
      sign-image: true
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  build_vbmc:
    name: build vbmc image
    if: github.repository == 'metal3-io/ironic-image'
    permissions:
      contents: read
      id-token: write
    uses: metal3-io/project-infra/.github/workflows/container-image-build.yml@main # zizmor: ignore[unpinned-uses]
    with:
      image-name: 'vbmc'
      dockerfile-directory: resources/vbmc
      pushImage: true
      generate-sbom: true
      sign-image: true
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  build_client:
    name: build ironic-client image
    if: github.repository == 'metal3-io/ironic-image'
    permissions:
      contents: read
      id-token: write
    uses: metal3-io/project-infra/.github/workflows/container-image-build.yml@main # zizmor: ignore[unpinned-uses]
    with:
      image-name: 'ironic-client'
      dockerfile-directory: resources/ironic-client
      pushImage: true
      generate-sbom: true
      sign-image: true
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
